# Nginx im web-Container: statisches Frontend + Reverse-Proxy /api -> backend.
# TLS/HTTPS terminiert der vorgelagerte Nginx Proxy Manager (dort HSTS aktivieren!).

# Nginx-Version nicht verraten (Server-Header/Fehlerseiten).
server_tokens off;

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Security-Header (für alle Antworten inkl. Proxy; `always` auch bei 4xx/5xx) ---
    # MIME-Sniffing unterbinden.
    add_header X-Content-Type-Options "nosniff" always;
    # Kein Einbetten in fremde Seiten (Clickjacking).
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Keine Referrer-Daten an fremde Origins.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Mächtige Browser-APIs, die die App nicht braucht, explizit aus.
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    # CSP: nur eigene Ressourcen + Google Fonts (index.html) + data:-Bilder (Icons).
    # 'unsafe-inline' für style: React-Inline-Styles (style={{…}}) + Font-Link.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; manifest-src 'self'; worker-src 'self'; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    # Gehashte Assets aggressiv cachen (Vite benennt sie mit Hash).
    # Achtung: eigenes add_header im Block deaktiviert die geerbten – Security-
    # Header hier deshalb wiederholen.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # API-Anfragen ans Backend weiterleiten
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        # Übergroße Requests früh abweisen (Backend limitiert zusätzlich auf 1 MiB).
        client_max_body_size 2m;
    }

    # SPA-Fallback: HashRouter braucht nur index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
